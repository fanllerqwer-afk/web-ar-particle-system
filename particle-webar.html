#wi{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);color:#ffd080;font-size:13px;z-index:50;pointer-events:none;opacity:0;transition:opacity .2s;text-shadow:0 0 14px rgba(255,200,100,0.9)}
#wi.on{opacity:1}

#dm:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3)}

<body>
<canvas id="c"></canvas>
<video id="v" playsinline autoplay></video>
<div id="ov"><div class="sp"></div><div class="st">正在初始化视觉系统...</div><div class="er" id="er"></div></div>
<div id="gl">✨ 张开手掌 · 球体</div>
<div id="wi">挥手风暴</div>
<button id="dm" onclick="window._demoToggle()">🎬 演示模式</button>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from "three";
// ===== CONFIG (no depth scaling) =====
const C={
  SN:12000,TN:8000,R:2.8,
  // Shape physics: spring-damper (acceleration-based, NO lerp)
  sK:0.04, sDamp:0.12,
  // Trail physics: gravity + drag (acceleration-based, NO velocity multipliers)
  trGrav:0.25, trDamp:1.5,
  trLife:2.5, trEmBase:4, trEmMul:8,
  // Transition: multi-phase physical reform
  tranTime:1.5, tranBurst:0.35,
  // Wave storm
  wTh:1.2, wF:0.06, wR:4.0,
  // Idle
  idle:0.001,
  // Gesture
  cF:3
};
const SN=C.SN,TN=C.TN,PN=SN+TN;

// DOM
const c3=document.getElementById("c"),vid=document.getElementById("v");
const ov=document.getElementById("ov"),st=ov.querySelector(".st"),er=document.getElementById("er");
const gl=document.getElementById("gl"),wi=document.getElementById("wi"),dm=document.getElementById("dm");

// THREE.JS
const rdr=new THREE.WebGLRenderer({canvas:c3,antialias:true,alpha:false});
rdr.setPixelRatio(Math.min(devicePixelRatio,2));rdr.setSize(innerWidth,innerHeight);rdr.setClearColor(0x000510,1);
const sc=new THREE.Scene(),cam=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.3,25);
cam.position.set(0,0,6.5);cam.lookAt(0,0,0);

// BG
const bgG=new THREE.BufferGeometry(),bgN=200,bgP_=new Float32Array(bgN*3);
for(let i=0;i<bgN;i++){bgP_[i*3]=(Math.random()-0.5)*16;bgP_[i*3+1]=(Math.random()-0.5)*12;bgP_[i*3+2]=-4-Math.random()*8}
bgG.setAttribute("position",new THREE.BufferAttribute(bgP_,3));
const bgM_=new THREE.PointsMaterial({color:0x002244,size:0.04,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const bgS_=new THREE.Points(bgG,bgM_);sc.add(bgS_);

// CUSTOM GLOW SHADER
const vs=`attribute float aSize;attribute float aAlpha;attribute vec3 aColor;
varying float vAlpha;varying vec3 vColor;
void main(){vec4 mv=modelViewMatrix*vec4(position,1.0);gl_PointSize=aSize*(300.0/-mv.z);gl_Position=projectionMatrix*mv;vAlpha=aAlpha;vColor=aColor;}`;
const fs=`varying float vAlpha;varying vec3 vColor;
void main(){float d=length(gl_PointCoord-0.5)*2.0;float a=1.0-smoothstep(0.0,1.0,d);a=pow(a,2.0);float g=exp(-d*2.0)*0.55;float aa=(a+g)*vAlpha;gl_FragColor=vec4(vColor*1.4,aa);}`;
const shdMat=new THREE.ShaderMaterial({vertexShader:vs,fragmentShader:fs,transparent:true,depthWrite:false,depthTest:true,blending:THREE.AdditiveBlending});

// PARTICLE ARRAYS
const pX=new Float32Array(PN),pY=new Float32Array(PN),pZ=new Float32Array(PN);
const vX=new Float32Array(PN),vY=new Float32Array(PN),vZ=new Float32Array(PN);
const aX=new Float32Array(PN),aY=new Float32Array(PN),aZ=new Float32Array(PN);
const tX=new Float32Array(SN),tY=new Float32Array(SN),tZ=new Float32Array(SN);
const life=new Float32Array(PN),maxLife=new Float32Array(PN);
const pos=new Float32Array(PN*3),col=new Float32Array(PN*3),sz=new Float32Array(PN),al=new Float32Array(PN);
const pG=new THREE.BufferGeometry();
pG.setAttribute("position",new THREE.BufferAttribute(pos,3));
pG.setAttribute("aSize",new THREE.BufferAttribute(sz,1));
pG.setAttribute("aAlpha",new THREE.BufferAttribute(al,1));
pG.setAttribute("aColor",new THREE.BufferAttribute(col,3));
const pSys=new THREE.Points(pG,shdMat);sc.add(pSys);

// FINGER COLORS
const fCols=[[1,0.45,0.05],[0.08,0.95,1],[1,0.15,0.55],[0.15,1,0.4],[0.7,0.2,1]];

// SHAPES
function genSphere(n){const pts=new Float32Array(n*3),phi=Math.PI*(3-Math.sqrt(5)),R=C.R;
for(let i=0;i<n;i++){const y=1-(i/(n-1))*2,rY=Math.sqrt(1-y*y),th=phi*i;
pts[i*3]=Math.cos(th)*rY*R;pts[i*3+1]=y*R;pts[i*3+2]=Math.sin(th)*rY*R}return pts}
function genText(n){const tc=document.createElement("canvas");tc.width=512;tc.height=160;
const ctx=tc.getContext("2d");ctx.fillStyle="#000";ctx.fillRect(0,0,512,160);
ctx.fillStyle="#fff";ctx.font='bold 80px "PingFang SC","Microsoft YaHei",sans-serif';
ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("我是 Mok",256,80);
const img=ctx.getImageData(0,0,512,160),d=img.data,w=[];
for(let y=0;y<160;y+=2)for(let x=0;x<512;x+=2)if(d[(y*512+x)*4]>128)w.push({x,y});
const pts=new Float32Array(n*3);if(w.length===0)return genSphere(n);
const sx=C.R*2.2/512,sy=C.R*0.9/160,cx=256,cy=80;
for(let i=0;i<n;i++){const p=w[i%w.length];
pts[i*3]=(p.x+(Math.random()-.5)*2-cx)*sx;pts[i*3+1]=(cy-(p.y+(Math.random()-.5)*2))*sy;pts[i*3+2]=(Math.random()-.5)*.3}return pts}
function genRing(n){const pts=new Float32Array(n*3),R=C.R*.75,r=C.R*.15;
for(let i=0;i<n;i++){const u=Math.random()*Math.PI*2,v=Math.random()*Math.PI*2;
pts[i*3]=(R+r*Math.cos(v))*Math.cos(u);pts[i*3+1]=r*Math.sin(v)*1.5;pts[i*3+2]=(R+r*Math.cos(v))*Math.sin(u)}return pts}
function genStar(n){const pts=new Float32Array(n*3),oR=C.R*.9,iR=C.R*.35;
for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,aa=(a%(Math.PI*2/5))/(Math.PI*2/5),t=aa<.5?aa*2:(1-aa)*2,r=iR+(oR-iR)*t;
pts[i*3]=Math.cos(a)*r;pts[i*3+1]=Math.sin(a)*r;pts[i*3+2]=(Math.random()-.5)*.25}return pts}
function genHeart(n){const pts=new Float32Array(n*3),s=C.R*.22;
for(let i=0;i<n;i++){const t=Math.random()*Math.PI*2,x=16*Math.pow(Math.sin(t),3),y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
pts[i*3]=x*s+(Math.random()-.5)*.08;pts[i*3+1]=y*s+(Math.random()-.5)*.08;pts[i*3+2]=(Math.random()-.5)*.35}return pts}
const shapes={open:genSphere(SN),scissors:genText(SN),fist:genRing(SN),point:genStar(SN),thumbsUp:genHeart(SN)};

// INIT SHAPE
(function(){const t=shapes.open;
for(let i=0;i<SN;i++){const r=C.R*(0.8+Math.random()*0.4),th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
pX[i]=Math.sin(ph)*Math.cos(th)*r;pY[i]=Math.sin(ph)*Math.sin(th)*r;pZ[i]=Math.cos(ph)*r;
vX[i]=vY[i]=vZ[i]=0;aX[i]=aY[i]=aZ[i]=0;tX[i]=t[i*3];tY[i]=t[i*3+1];tZ[i]=t[i*3+2];
col[i*3]=0;col[i*3+1]=0.9;col[i*3+2]=1;sz[i]=1.2;al[i]=0.9;life[i]=1;maxLife[i]=1}})();
// INIT TRAIL
for(let i=SN;i<PN;i++){pX[i]=pY[i]=pZ[i]=0;vX[i]=vY[i]=vZ[i]=0;
life[i]=0;maxLife[i]=C.trLife*(0.5+Math.random());sz[i]=0.3+Math.random()*0.8;al[i]=0}

// GESTURE DETECTION
function d3(a,b){const dx=a.x-b.x,dy=a.y-b.y,dz=(a.z||0)-(b.z||0);return Math.hypot(dx,dy,dz)}
function fUp(lm,tip,pip,mcp){const dt=d3(lm[tip],lm[mcp]),dp=d3(lm[pip],lm[mcp]);return dt>dp*1.05&&lm[tip].y<lm[mcp].y}
function tUp(lm){const dt=d3(lm[4],lm[0]),dm=d3(lm[2],lm[0]);return dt>dm*1.1}
function classify(lm){if(!lm||lm.length<21)return null;
const iU=fUp(lm,8,6,5),mU=fUp(lm,12,10,9),rU=fUp(lm,16,14,13),pU=fUp(lm,20,18,17),tU_=tUp(lm);
if(iU&&mU&&rU&&pU&&tU_)return"open";if(!iU&&!mU&&!rU&&!pU&&!tU_)return"fist";
if(iU&&mU&&!rU&&!pU)return"scissors";if(iU&&!mU&&!rU&&!pU&&!tU_)return"point";
if(tU_&&!iU&&!mU&&!rU&&!pU)return"thumbsUp";return null}
const gNames={open:"✨ 张开手掌 · 球体",scissors:"✌️ 剪刀手 · 我是 Mok",fist:"✊ 握拳 · 圆环",point:"☝️ 食指 · 星形",thumbsUp:"👍 拇指 · 爱心"};

// STATE
let curG="open",pendG=null,pendF=0,detected=false,demoMode=false,tranTimer=0,tranPhase=0;
let oldTX=new Float32Array(SN*3),oldTY=new Float32Array(SN*3),oldTZ=new Float32Array(SN*3);
let hcX=0,hcY=0,smoothSpd=0,lastPalm=null,lastPalmT=0,trailIdx=SN;
let demoT=0,demoSpd=0;

// ===== FINGERTIP TRAIL SPAWN (acceleration-based initial velocity) =====
const fTips=[4,8,12,16,20];
function spawnTrail(x,y,z,vx,vy,vz,ci){
  const i=trailIdx;
  pX[i]=x;pY[i]=y;pZ[i]=z;
  // Initial velocity: inherited from finger movement + random spread
  vX[i]=vx+(Math.random()-0.5)*0.6;
  vY[i]=vy+(Math.random()-0.5)*0.5-0.1;
  vZ[i]=vz+(Math.random()-0.5)*0.4;
  life[i]=1;maxLife[i]=C.trLife*(0.6+Math.random()*0.8);
  const fc=fCols[ci%5];col[i*3]=fc[0];col[i*3+1]=fc[1];col[i*3+2]=fc[2];
  sz[i]=0.2+Math.random()*1.2;al[i]=0.85+Math.random()*0.15;
  trailIdx++;if(trailIdx>=PN)trailIdx=SN;
}
function emitTrails(lm,hSpd){
  const rate=C.trEmBase+hSpd*C.trEmMul;
  const count=Math.floor(rate);
  for(let f=0;f<5;f++){
    const tip=lm[fTips[f]],tx=(tip.x-0.5)*C.R*2.5,ty=(0.5-tip.y)*C.R*2.5,tz=tip.z*C.R*1.5;
    for(let j=0;j<count;j++)spawnTrail(tx,ty,tz,(Math.random()-.5)*0.3,(Math.random()-.5)*0.2-0.1,(Math.random()-.5)*0.2,f);
  }
}

// ===== DEMO MODE =====
function demoSim(dt){
  demoT+=dt;
  const tx=Math.sin(demoT*0.7)*C.R*1.5,ty=Math.cos(demoT*0.5)*C.R;
  const px=Math.sin((demoT-0.05)*0.7)*C.R*1.5,py=Math.cos((demoT-0.05)*0.5)*C.R;
  demoSpd=demoSpd*0.85+Math.hypot(tx-px,ty-py)/0.05*0.15;
  hcX=tx;hcY=ty;smoothSpd=demoSpd;
  for(let f=0;f<5;f++){const a=demoT*1.3+f*1.2;const fx=tx+Math.cos(a)*0.4,fy=ty+Math.sin(a)*0.3;
  const ec=Math.floor(C.trEmBase+demoSpd*C.trEmMul);
  for(let j=0;j<ec;j++)spawnTrail(fx,fy,(Math.random()-.5)*0.3,(Math.random()-.5)*0.3,(Math.random()-.5)*0.2-0.1,(Math.random()-.5)*0.2,f)}
  const gs=["open","scissors","fist","point","thumbsUp"];
  const gi=Math.floor(demoT/4)%gs.length,gn=gs[gi];
  if(gn!==curG){triggerTransition(gn)}
  detected=true;
}
window._demoToggle=function(){demoMode=!demoMode;dm.textContent=demoMode?"🎬 演示中...(点击停止)":"🎬 演示模式";
if(!demoMode){curG="open";setTargetsInstant(curG);gl.textContent=gNames[curG];detected=false;smoothSpd=0}}

// ===== SHAPE TRANSITION: multi-phase physical reform =====
function triggerTransition(newG){
  // Phase 0 (0 to tranBurst): save old targets, cut spring — particles free-fly
  // Phase 1 (tranBurst to tranTime): set new targets, strong spring pulls particles in
  // After tranTime: normal spring strength
  
  // Save current positions as "old targets" so phase 0 keeps them drifting
  for(let i=0;i<SN;i++){oldTX[i]=pX[i];oldTY[i]=pY[i];oldTZ[i]=pZ[i]}
  
  // Pre-compute new targets
  const nt=shapes[newG]||shapes.open;
  for(let i=0;i<SN;i++){tX[i]=nt[i*3];tY[i]=nt[i*3+1];tZ[i]=nt[i*3+2]}
  
  // Add outward burst velocity (physical: radial impulse)
  const burst=C.tranBurst;
  for(let i=0;i<SN;i++){
    const dx=pX[i],dy=pY[i],dz=pZ[i],d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.001;
    vX[i]+=(dx/d)*burst+(Math.random()-0.5)*burst*0.5;
    vY[i]+=(dy/d)*burst+(Math.random()-0.5)*burst*0.5;
    vZ[i]+=(dz/d)*burst+(Math.random()-0.5)*burst*0.5;
  }
  
  tranTimer=C.tranTime;
  curG=newG;gl.textContent=gNames[curG]||curG;
}
function setTargetsInstant(g){const nt=shapes[g]||shapes.open;for(let i=0;i<SN;i++){tX[i]=nt[i*3];tY[i]=nt[i*3+1];tZ[i]=nt[i*3+2]}}

// ===== PHYSICS (pure acceleration-based, NO lerp, NO velocity *= factor) =====
function phys(dt){
  const dtc=Math.min(dt,0.1);
  const sK=C.sK,sD=C.sDamp;
  const grav=C.trGrav,tD=C.trDamp;
  
  // --- Shape particles (0 to SN-1) ---
  // Acceleration = spring*(target-pos) - damping*velocity
  // During transition phase 0 (timer > tranTime - tranBurst): no spring, just damp + drift
  const tranPhase0=tranTimer>C.tranTime-C.tranBurst;
  const k=tranPhase0?0:sK; // cut spring during burst phase
  
  for(let i=0;i<SN;i++){
    aX[i]=(tX[i]-pX[i])*k - vX[i]*sD;
    aY[i]=(tY[i]-pY[i])*k - vY[i]*sD;
    aZ[i]=(tZ[i]-pZ[i])*k - vZ[i]*sD;
    if(!detected&&!demoMode){aX[i]+=(Math.random()-0.5)*C.idle*60;aY[i]+=(Math.random()-0.5)*C.idle*60;aZ[i]+=(Math.random()-0.5)*C.idle*60}
    // Semi-implicit Euler: vel += acc*dt, pos += vel*dt
    vX[i]+=aX[i]*dtc;vY[i]+=aY[i]*dtc;vZ[i]+=aZ[i]*dtc;
    pX[i]+=vX[i]*dtc;pY[i]+=vY[i]*dtc;pZ[i]+=vZ[i]*dtc;
  }
  
  // --- Trail particles (SN to PN-1) ---
  // Acceleration: gravity downward + drag proportional to velocity
  // drag = -trDamp * velocity  (acceleration-based, NOT velocity *= 0.975)
  for(let i=SN;i<PN;i++){
    if(life[i]<=0)continue;
    aX[i]=-vX[i]*tD;
    aY[i]=-grav - vY[i]*tD;
    aZ[i]=-vZ[i]*tD;
    vX[i]+=aX[i]*dtc;vY[i]+=aY[i]*dtc;vZ[i]+=aZ[i]*dtc;
    pX[i]+=vX[i]*dtc;pY[i]+=vY[i]*dtc;pZ[i]+=vZ[i]*dtc;
    life[i]-=dtc/maxLife[i];al[i]=Math.pow(life[i],0.7)*0.9;
    if(life[i]<=0){al[i]=0;pX[i]=0;pY[i]=0;pZ[i]=0;vX[i]=vY[i]=vZ[i]=0}
  }
}

// ===== WAVE (acceleration-based impulse, not velocity addition with dt*60 hack) =====
function applyWind(dt){
  if(!detected||smoothSpd<C.wTh)return;
  const dtc=Math.min(dt,0.1);
  const f=smoothSpd*C.wF,mR=C.wR;
  // Apply as acceleration impulse (force/mass), properly scaled by dt
  for(let i=0;i<SN;i++){
    const dx=pX[i]-hcX,dy=pY[i]-hcY,dz=pZ[i],d=Math.sqrt(dx*dx+dy*dy+dz*dz)+0.01;
    if(d<mR){
      const falloff=(1-d/mR);
      const imp=f*falloff*falloff;
      aX[i]+=(dx/d)*imp;
      aY[i]+=(dy/d)*imp;
      aZ[i]+=(dz/d)*imp;
    }
  }
}

// ===== BUFFERS =====
function bufUpd(){
  for(let i=0;i<PN;i++){pos[i*3]=pX[i];pos[i*3+1]=pY[i];pos[i*3+2]=pZ[i]}
  pG.attributes.position.needsUpdate=true;pG.attributes.aAlpha.needsUpdate=true;
  // Transition color flash
  if(tranTimer>0){
    const phase=Math.min(tranTimer/C.tranTime,1);
    const flash=phase>0.7?Math.pow((phase-0.7)/0.3,2):0;
    for(let i=0;i<SN;i++){col[i*3]=flash;col[i*3+1]=0.9+flash*0.1;col[i*3+2]=1-flash*0.3}
  }else if(detected||demoMode){
    for(let i=0;i<SN;i++){col[i*3]=0;col[i*3+1]=0.9;col[i*3+2]=1}
  }
  pG.attributes.aColor.needsUpdate=true;
}

// HAND PROCESSING
function procHand(lm){
  if(demoMode)return;detected=true;
  const palm={x:0,y:0,z:0},ix=[0,5,9,13,17];ix.forEach(i=>{palm.x+=lm[i].x;palm.y+=lm[i].y;palm.z+=lm[i].z||0});
  palm.x/=5;palm.y/=5;palm.z/=5;hcX=(palm.x-0.5)*C.R*2.5;hcY=(0.5-palm.y)*C.R*2.5;
  const now=performance.now();
  if(lastPalm){const dt2=(now-lastPalmT)/1000;if(dt2>0){const dx2=palm.x-lastPalm.x,dy2=palm.y-lastPalm.y;
  smoothSpd=smoothSpd*0.85+Math.hypot(dx2,dy2)/dt2*0.15}}
  lastPalm=palm;lastPalmT=now;
  emitTrails(lm,smoothSpd);
  const g=classify(lm);if(g===pendG){pendF++}else{pendG=g;pendF=1}
  if(pendG&&pendG!==curG&&pendF>C.cF)triggerTransition(pendG);
}
function noHand(){if(demoMode)return;detected=false;smoothSpd*=.9;pendG=null;pendF=0}

// MEDIAPIPE
let hands=null,camFeed=null;
async function setupMP(){
  st.textContent="正在下载手势模型...";
  hands=new Hands({locateFile:(f)=>"https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/"+f});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.6,minTrackingConfidence:0.5,selfieMode:true});
  hands.onResults(r=>{const h=r.multiHandLandmarks&&r.multiHandLandmarks[0];if(h)procHand(h);else noHand()});
  st.textContent="正在连接摄像头...";
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:"user"}});
    vid.srcObject=stream;
    await new Promise((resolve,reject)=>{const t=setTimeout(()=>reject(new Error("视频超时")),5000);
    vid.onloadedmetadata=()=>{clearTimeout(t);vid.play().then(resolve).catch(reject)}});
    camFeed=new Camera(vid,{onFrame:async()=>{if(hands&&hands.send)await hands.send({image:vid})},width:640,height:480});
    await camFeed.start();
    st.textContent="准备就绪";dm.style.display="block";
  }catch(e){st.textContent="摄像头不可用，使用演示模式";dm.style.display="block"}
  setTimeout(()=>ov.classList.add("hid"),800);
}

// RENDER LOOP
let lastF=performance.now();
function anim(ts){
  requestAnimationFrame(anim);
  let dt=(ts-lastF)/1000;if(dt<=0)dt=.016;lastF=ts;
  if(demoMode)demoSim(dt);
  if(tranTimer>0){tranTimer-=dt;if(tranTimer<0)tranTimer=0}
  phys(dt);applyWind(dt);bufUpd();
  if(smoothSpd>C.wTh){wi.classList.add("on");wi.textContent="≈ 挥手风暴"}else wi.classList.remove("on");
  if(detected||demoMode){cam.position.x+=(hcX*.15-cam.position.x)*.03;cam.position.y+=(hcY*.1+.3-cam.position.y)*.03;cam.lookAt(hcX*.3,hcY*.3,0)}
  else{cam.position.x+=(0-cam.position.x)*.02;cam.position.y+=(.3-cam.position.y)*.02;cam.lookAt(0,0,0)}
  bgS_.rotation.y+=dt*.03;bgS_.rotation.x+=dt*.01;rdr.render(sc,cam);
}
window.addEventListener("resize",()=>{rdr.setSize(innerWidth,innerHeight);cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix()});

(async function(){
  try{await setupMP();requestAnimationFrame(anim)}
  catch(e){console.error(e);er.textContent="初始化失败: "+e.message;er.style.display="block";st.textContent="启动失败";dm.style.display="block";ov.classList.add("hid");requestAnimationFrame(anim)}
})();

</script>
